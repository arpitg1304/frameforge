name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install opencv-python

      - name: Run tests
        run: pytest -v --tb=short

      - name: Verify imports
        run: |
          python -c "from frameforge import VideoReader, VideoFrameIndex"
          python -c "from frameforge.packing import PackConfig, pack_shards, ShardDataset"
          python -c "from frameforge.sampling import UniformSampler, EpisodeSampler"
          python -c "from frameforge.dataloader import VideoClipDataset"
          python -c "from frameforge.writer import VideoWriter"
